services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stormshield-backend
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - DATABASE_URL=sqlite:////app/data/stormshield.db
    volumes:
      - stormshield-db:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stormshield-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  stormshield-db:
