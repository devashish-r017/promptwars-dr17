services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stormshield-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/stormshield.db
    volumes:
      - stormshield-db:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stormshield-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  stormshield-db:
